<!DOCTYPE html>
<html lang="sl-SL">
<head>
	<title>The brihs</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	
	<link rel="shortcut icon" type="image/x-icon" href="slike/among1.webp">
	<link rel="stylesheet" href="style.css" type="text/css" media="all">

	
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
	<div id="startOverlay" class="start-overlay" role="dialog" aria-modal="true" aria-labelledby="startTitle">
		<div class="start-card">
			<h2 id="startTitle">How To Play</h2>
			<p>Move with Left / Right arrows.</p>
			<p>Break all blocks to win.</p>
			<p>Each block hit plays a music clip.</p>
			<button id="startGameBtn" type="button">Start Game</button>
		</div>
	</div>

	<div id="bgMarquee" class="bg-marquee" aria-hidden="true"></div>

	<div class="page-content">
		
		
		<div>
			<canvas id="canvas" width="800" height="800"></canvas>
		</div>

		<div>Score: <span id="tocke">0</span></div>
		<div>Time: <span id="cas">00:00</span></div>
	</div>

	<script src="form.js"></script>
</body>
</html>
